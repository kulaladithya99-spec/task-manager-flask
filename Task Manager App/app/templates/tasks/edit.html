{% extends 'base.html' %}
{% block title %}Edit Task{% endblock %}

{% block content %}
<div style="max-width:520px;margin:0 auto">

  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
    <a href="{{ url_for('tasks.index') }}"
       style="color:#888;text-decoration:none;font-size:14px">
      ← Back
    </a>
    <h2>Edit task</h2>
  </div>

  <div style="background:#fff;border:1px solid #e5e5e5;
              border-radius:12px;padding:28px">
    <form method="POST">

      <div class="form-group">
        <label>Task title *</label>
        <input type="text" name="title"
               value="{{ task.title }}" required />
      </div>

      <div class="form-group">
        <label>Description (optional)</label>
        <textarea name="description" rows="3">{{ task.description or '' }}</textarea>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Priority</label>
          <select name="priority">
            <option value="low"    {% if task.priority=='low'    %}selected{% endif %}>Low</option>
            <option value="medium" {% if task.priority=='medium' %}selected{% endif %}>Medium</option>
            <option value="high"   {% if task.priority=='high'   %}selected{% endif %}>High</option>
          </select>
        </div>

        <div class="form-group">
          <label>Due date (optional)</label>
          <input type="date" name="due_date"
                 value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}" />
        </div>
      </div>

      <div class="form-group">
        <label>Category (optional)</label>
        <select name="category_id">
          <option value="">No category</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}"
            {% if task.category_id == cat.id %}selected{% endif %}>
            {{ cat.name }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div style="display:flex;gap:10px">
        <button type="submit" class="btn btn-primary" style="flex:1">
          Save changes
        </button>
        <a href="{{ url_for('tasks.index') }}"
           class="btn" style="flex:1;text-align:center">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
